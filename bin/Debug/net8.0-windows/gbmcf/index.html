<!DOCTYPE html>
<html>
<head>
  <title>Geo's Better MCF</title>

  <style>
    body {
      font-family: Arial;
      background: #111827;
      color: white;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 250px;
      background: #1f2937;
      color: white;
      border: none;
      padding: 10px;
      font-family: monospace;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    pre {
      background: #1f2937;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h1 text-align="center";>Geo's Better MCF</h1> <button onclick="openCmds()" text-align="left">
  Commands
</button>

<textarea id="input" placeholder='Type Code Here...'></textarea>

<button onclick="runCompile()" text-align="center">
Compile
</button>

<h2 text-align="center">Compiled Output</h2>

  <pre id="output">Type code above for an output.</pre>

  <button onclick="getCode()" text-align="center">Copy Code</button> 
  
<script>
const variables = {}

function tokenize(line) {
  return line.match(/"[^"]*"|\S+/g) || []
}

function compile(code) {
  const lines = code.split("\n")
  const output = []

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim()

    if (!line) continue

    // comments
    if (line.startsWith("#")) continue

    const parts = tokenize(line)

    const cmd = parts[0]
    
    // VARIABLES
    if (cmd === "store") {
      const name = parts[1]
      const value = parts[3]
      const mode = parts[4]

      if (mode === undefined) {
        output.push(`scoreboard players set ${name} gbmcf_vars ${value}`)
      } else if (mode === "add") {
        output.push(`scoreboard players add ${name} gbmcf_vars ${value}`)
      } else if (mode === "sub") {
        output.push(`scoreboard players remove ${name} gbmcf_vars ${value}`)
      } else if (mode === "del") {
        output.push(`scoreboard players reset ${name} gbmcf_vars`)
      }

    }
      // ENABLE/DELETE VARIABLES
      else if (cmd === "vars") {
  const toggle = parts[1]

  if (toggle === "create") {
    output.push(
      `scoreboard objectives add gbmcf_vars dummy`
    )
  }

  else if (toggle === "delete") {
    output.push(
      `scoreboard objectives remove gbmcf_vars`
    )
  }
}
      // ANNJSON
    else if (cmd === "annjson") {
    const target = parts[1]

      const json = parts.slice(2).join(" ")

      output.push(`tellraw ${target} ${json}`)
}
          
    // ANNOUNCE
    else if (cmd === "announce") {
      const msg = parts
        .slice(1)
        .join(" ")
        .replace(/^"|"$/g, "")

      output.push(`say ${msg}`)
    }

    // MOVE
    else if (cmd === "move") {
      const target = parts[1]
      const x = parts[2]
      const y = parts[3]
      const z = parts[4]

      if (parts.length < 5) {
  output.push("SYNTAX ERROR: move")
  continue
}

      output.push(`tp ${target} ${x} ${y} ${z}`)
    }

    // EFFECT CLEAR
    else if (
      cmd === "effect" &&
      parts[2] === "clear"
    ) {
      const target = parts[1]

      output.push(`effect clear ${target}`)
    }

    // EFFECT ADD
    else if (
      cmd === "effect" &&
      parts[2] === "add"
    ) {
      const target = parts[1]
      const effect = parts[3]

      const duration = parts[4]
      const amplifier = parts[5]
      let particles = parts[6]

      if (particles === undefined) {
        particles = "false"
      }

      output.push(
        `effect give ${target} ${effect} ${duration} ${amplifier} ${particles}`
      )
    }
      else if (cmd === "if") {
  const varname = parts[1]
  const operator = parts[2]
  const comp = parts[3]

  const mccmd = parts
    .slice(5)
    .join(" ")

  let range = comp

  if (operator === ">=") {
    range = `${comp}..`
  }

  else if (operator === "=<") {
    range = `..${comp}`
  }

  else if (operator === "==") {
    range = comp
  } if (!mccmd) {
    output.push(`SYNTAX ERROR: if`)
  } else {
  output.push(
    `execute if score ${varname} gbmcf_vars matches ${range} run ${mccmd}`
  )
  }
}
        else if (cmd === "raw") {
  output.push(
    parts.slice(1).join(" ")
  )
}
  else if (cmd === "moveblock") {
  const x = parts[1]
  const y = parts[2]
  const z = parts[3]
  const dx = parts[4]
  const dy = parts[5]
  const dz = parts[6]

  if (parts.length < 7) {
    output.push(`SYNTAX ERROR: moveblock`)
  } else {
    output.push(`clone ${x} ${y} ${z} ${dx} ${dy} ${dz}`)
    output.push(`setblock ${x} ${y} ${z} air`)
  }
}
      else {
        output.push(
          `SYNTAX ERROR: ${line}`
        )
      }
  }
  return output.join("\n")
}

function runCompile() {
  const code =
    document.getElementById("input").value

  const compiled = compile(code)

  document.getElementById("output").textContent =
    compiled
}
  function getCode() {
  const copy =
    document.getElementById("output").textContent

  if (copy === "") {
    alert("No code compiled!")
  }
  else {
    navigator.clipboard.writeText(copy)

    alert("Copied!")
  }
}
  function openCmds() {
  window.location.href = "cmds.html"
  }
  window.runCompile = runCompile
  window.getCode = getCode
</script>

</body>
</html>
